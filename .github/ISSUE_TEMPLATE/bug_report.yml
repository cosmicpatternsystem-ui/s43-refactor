name: Bug report
description: Report a reproducible defect
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce it safely.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps to reproduce the issue.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation evidence
      description: Paste logs, commands, or screenshots if relevant.
      render: text

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, Python version, or other relevant runtime details.
      placeholder: |
        OS:
        Shell:
        Python:
