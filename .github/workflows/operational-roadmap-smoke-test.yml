name: Operational Roadmap Smoke Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  roadmap-smoke:
    name: Roadmap generator and validator smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell
        shell: bash
        run: pwsh -v

      - name: Run roadmap validator
        shell: pwsh
        run: ./scripts/validate-roadmap.ps1

      - name: Run roadmap generator
        shell: pwsh
        run: ./scripts/update-roadmap.ps1

      - name: Re-validate generated roadmap
        shell: pwsh
        run: ./scripts/validate-roadmap.ps1

      - name: Validate roadmap governance contract
        shell: bash
        run: python roadmap_guard.py ROADMAP_CURRENT.json