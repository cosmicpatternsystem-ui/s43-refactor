name: Policy Smoke Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  policy-smokes:
    name: policy-smokes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify policy files exist
        run: |
          test -f S43_ROADMAP_CHANGE_CONTROL_POLICY.md
          test -f S43_ROADMAP_DECISION_LOG.md

      - name: Verify roadmap files exist
        run: |
          test -f ROADMAP_vNEXT.md || test -f ROADMAP_CANONICAL.md
