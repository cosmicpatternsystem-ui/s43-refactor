name: Operational Roadmap Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  assert-operational-roadmap-contract:
    name: Assert operational roadmap contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Assert roadmap files exist
        shell: bash
        run: |
          test -f ROADMAP/ROADMAP_STATE.json
          test -f ROADMAP/ROADMAP_CANONICAL.md
          test -f AUDIT/ROADMAP_CURRENT.json
          test -f AUDIT/ROADMAP_CURRENT.md

      - name: Validate roadmap state JSON
        shell: bash
        run: python tools/validate_roadmap_state.py

      - name: Assert no stale roadmap state remains
        shell: bash
        run: python tools/assert_no_stale_roadmap.py

