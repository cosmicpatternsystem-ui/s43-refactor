name: Operational Roadmap Enforcement

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  enforce-roadmap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell
        shell: bash
        run: pwsh -v

      - name: Validate committed roadmap schema
        shell: pwsh
        run: ./scripts/validate-roadmap.ps1

      - name: Validate roadmap governance contract
        shell: bash
        run: python scripts/roadmap_guard.py ROADMAP_CURRENT.json

      - name: Regenerate roadmap deterministically
        shell: pwsh
        run: ./scripts/update-roadmap.ps1

      - name: Assert roadmap is current
        shell: bash
        run: |
          git diff --exit-code -- ROADMAP_CURRENT.json || {
            echo "::error::ROADMAP_CURRENT.json is stale. Run ./scripts/update-roadmap.ps1 and commit the result."
            exit 1
          }

      - name: Debug roadmap drift
        if: failure()
        shell: bash
        run: |
          git rev-parse HEAD
          git status --short
          git diff -- ROADMAP_CURRENT.json || true
          sed -n '1,60p' ROADMAP_CURRENT.json || true