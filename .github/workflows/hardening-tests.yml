name: Hardening Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  hardening-tests:
    name: hardening-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run hardening tests
        run: python run_hardening_tests.py
