name: Release Readiness Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  assert-release-readiness-contract:
    name: Assert release readiness contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert release readiness contract
        run: bash run_safe.sh release
